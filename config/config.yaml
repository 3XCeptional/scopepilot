# ScopePilot Default Configuration
# This file defines a sample program for development/testing.
global:
  kill_switch:
    enabled: false
  defaults:
    requests_per_second_per_host: 5
    max_concurrency: 5
    max_response_bytes: 10485760
    allowed_schemes:
      - http
      - https
    allowed_ports:
      - 80
      - 443
      - 8080
    dry_run: false
  audit:
    enabled: true
    retain_days: 30
    redact_secrets: true
  log_level: info
  log_format: text

programs:
  - id: scopepilot-dev
    name: ScopePilot Development
    authorization_reference: "https://example.com/policy"
    active_testing_enabled: false
    network_policy:
      vpn: prohibited
      stable_source_ip_required: false
    limits:
      requests_per_second_per_host: 5
      max_concurrency: 5
      max_response_bytes: 10485760
      allowed_schemes:
        - http
        - https
      allowed_ports:
        - 80
        - 443
        - 8080
      max_requests_per_job: 1000
      max_crawl_depth: 3
    scope:
      include:
        - type: wildcard_host
          value: "*.example.com"
        - type: exact_host
          value: app.example.com
      exclude:
        - type: path_prefix
          host: app.example.com
          value: /admin
        - type: path_prefix
          host: app.example.com
          value: /logout
    restrictions:
      automated_scanning: permitted
      historical_url_collection: permitted
      subdomain_enumeration: permitted
      notes: "Development program for local testing"
    status: active
