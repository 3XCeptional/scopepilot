# ============================================================================
# ScopePilot — Rootless Podman Compose
# ============================================================================
# This compose file defines the ScopePilot container infrastructure:
#   - scopepilot:  scope-enforcing proxy with MCP JSON-RPC server
#   - fixture:     synthetic HTTP test server
#
# Security posture:
#   - Rootless (no privileged containers)
#   - No host networking
#   - No Podman socket mounts
#   - No broad host directory mounts
#   - Read-only root filesystem for scopepilot
#   - Dropped capabilities
#   - Internal-only network (no external gateway in test mode)
# ============================================================================

name: scopepilot

services:
  scopepilot:
    build:
      context: .
      dockerfile: containers/scopepilot/Containerfile
    container_name: scopepilot
    ports:
      - "127.0.0.1:8443:8443"   # Proxy (localhost only)
      - "127.0.0.1:9090:9090"   # MCP server (localhost only)
    expose:
      - "8443"
      - "9090"
    networks:
      - scopepilot-net
    volumes:
      - scopepilot-config:/etc/scopepilot:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/mcp 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["server", "--listen-proxy=:8443", "--listen-mcp=:9090"]

  fixture:
    build:
      context: .
      dockerfile: containers/fixture/Containerfile
    container_name: scopepilot-fixture
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    networks:
      - scopepilot-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  scopepilot-net:
    driver: bridge
    internal: true
    name: scopepilot-net

volumes:
  scopepilot-config:
    name: scopepilot-config
