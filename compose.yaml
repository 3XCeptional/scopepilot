# ============================================================================
# ScopePilot — Rootless Podman Compose
# ============================================================================
# This compose file defines the ScopePilot container infrastructure:
#   - scopepilot:  scope-enforcing proxy with MCP JSON-RPC server
#   - fixture:     synthetic HTTP test server
#
# Security posture:
#   - Rootless (no privileged containers)
#   - No host networking
#   - No Podman socket mounts
#   - No broad host directory mounts
#   - Read-only root filesystem for scopepilot
#   - Dropped capabilities
#   - Internal-only network (no external gateway in test mode)
# ============================================================================

name: scopepilot

services:
  scopepilot:
    build:
      context: .
      dockerfile: containers/scopepilot/Containerfile
    ports:
      - "127.0.0.1:8443:8443"   # Proxy (localhost only)
      - "127.0.0.1:9090:9090"   # MCP server (localhost only)
    expose:
      - "8443"
      - "9090"
    networks:
      - scopepilot-net
      - scopepilot-data
    volumes:
      - ./config:/etc/scopepilot:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      SCOPEPILOT_MCP_API_KEY: ${SCOPEPILOT_MCP_API_KEY:?set SCOPEPILOT_MCP_API_KEY}
      SCOPEPILOT_DEACTIVATION_TOKEN: ${SCOPEPILOT_DEACTIVATION_TOKEN:-}
      SCOPEPILOT_GATE_APPROVAL_TOKEN: ${SCOPEPILOT_GATE_APPROVAL_TOKEN:-}
      SCOPEPILOT_POSTGRES_ENABLED: "true"
      DATABASE_URL: postgres://scopepilot:${SCOPEPILOT_POSTGRES_PASSWORD:?set SCOPEPILOT_POSTGRES_PASSWORD}@postgres:5432/scopepilot?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "/scopepilot", "health", "--proxy-url=http://127.0.0.1:8443", "--mcp-url=http://127.0.0.1:9090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["server", "--config=/etc/scopepilot/config.yaml", "--listen-proxy=:8443", "--listen-mcp=:9090"]

  fixture:
    build:
      context: .
      dockerfile: containers/fixture/Containerfile
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    networks:
      - scopepilot-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    image: docker.io/postgres:17-alpine
    expose:
      - "5432"
    networks:
      - scopepilot-data
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: scopepilot
      POSTGRES_PASSWORD: ${SCOPEPILOT_POSTGRES_PASSWORD:?set SCOPEPILOT_POSTGRES_PASSWORD}
      POSTGRES_DB: scopepilot
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scopepilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  scopepilot-net:
    driver: bridge
    internal: true
    name: scopepilot-net
  scopepilot-data:
    driver: bridge
    internal: true
    name: scopepilot-data

volumes:
  pgdata:
