# ============================================================================
# ScopePilot — Container Publish
# ============================================================================
# Builds the scopepilot Containerfile and pushes to GHCR on version tags
# and releases. Uses docker/build-push-action to handle multi-arch and
# caching. Image tags: <version> and :latest.
# ============================================================================
name: Container Publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/scopepilot/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scopepilot:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/scopepilot:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.description=ScopePilot — scope-enforcing HTTP proxy with MCP tool server
